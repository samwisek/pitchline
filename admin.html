<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitchLine — Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --pitch-dark:#0b3d2e; --pitch-deep:#072a20; --line-white:#eef2ea;
    --gold:#c9a227; --gold-bright:#e6c14e; --card:#0f4b38; --card-edge:#1c6349;
    --ink:#eef2ea; --ink-dim:#9fc2b0; --danger:#d84f4f; --danger-bg:rgba(216,79,79,0.12);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--pitch-dark); color:var(--ink);
    font-family:'Inter', sans-serif; min-height:100vh; padding-bottom:60px;
  }
  h1,h2,.display{font-family:'Teko', sans-serif; font-weight:600; letter-spacing:0.02em;}
  header{padding:24px 20px 16px; text-align:center; border-bottom:2px dashed rgba(238,242,234,0.15);}
  header .brand{font-size:36px; text-transform:uppercase; color:var(--line-white);}
  header .brand span{color:var(--gold-bright);}
  header .tagline{color:var(--ink-dim); font-size:12px; letter-spacing:0.14em; text-transform:uppercase;}

  main{max-width:560px; margin:0 auto; padding:20px 16px;}

  /* Login */
  .login-box{
    max-width:340px; margin:60px auto; background:var(--card);
    border:1px solid var(--card-edge); border-radius:12px; padding:26px 22px;
  }
  .login-box h2{font-size:26px; color:var(--gold-bright); margin-bottom:14px; text-transform:uppercase;}
  label{display:block; font-size:11.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-dim); margin:12px 0 5px;}
  input, select, textarea{
    width:100%; background:rgba(238,242,234,0.06); border:1px solid rgba(238,242,234,0.15);
    border-radius:8px; padding:11px 12px; color:var(--ink); font-family:'Inter',sans-serif; font-size:14.5px;
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--gold); outline-offset:1px;}
  textarea{resize:vertical; min-height:56px;}
  button{
    cursor:pointer; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-weight:600;
  }
  .btn-primary{
    width:100%; background:var(--gold-bright); color:#1c1503; padding:12px; font-size:14.5px; margin-top:18px;
  }
  .btn-primary:hover{background:var(--gold);}
  .err{color:var(--danger); font-size:12.5px; margin-top:10px; min-height:16px;}

  /* Top bar once logged in */
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .signout{background:none; color:var(--ink-dim); font-size:12px; text-decoration:underline;}

  .stat-row{display:flex; gap:10px; margin:16px 0 24px;}
  .stat{
    flex:1; background:var(--card); border:1px solid var(--card-edge); border-radius:10px;
    padding:14px; text-align:center;
  }
  .stat .n{font-family:'Teko',sans-serif; font-size:30px; color:var(--gold-bright);}
  .stat .l{font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-dim);}

  .section-label{
    display:flex; align-items:center; gap:10px; font-size:12px; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--ink-dim); margin:26px 0 12px;
  }
  .section-label::after{content:""; flex:1; height:1px; background:rgba(238,242,234,0.15);}

  .form-card{background:var(--card); border:1px solid var(--card-edge); border-radius:12px; padding:18px;}
  .row2{display:flex; gap:10px;}
  .row2 > div{flex:1;}

  .slip{
    position:relative; background:var(--card); border:1px solid var(--card-edge);
    border-radius:10px; padding:14px 16px; margin-bottom:10px;
  }
  .slip-row{display:flex; justify-content:space-between; align-items:baseline; gap:10px;}
  .slip-match{font-size:16px; font-weight:600; color:var(--line-white);}
  .slip-odds{font-family:'Space Mono',monospace; font-weight:700; color:var(--gold-bright);}
  .slip-tip{color:var(--ink-dim); font-size:13px; margin-top:4px;}
  .slip-actions{display:flex; gap:8px; margin-top:10px;}
  .slip-actions button{
    flex:1; padding:8px; font-size:12px; background:rgba(238,242,234,0.06); color:var(--ink);
    border:1px solid rgba(238,242,234,0.15); border-radius:6px;
  }
  .slip-actions .del{background:var(--danger-bg); color:var(--danger); border-color:rgba(216,79,79,0.3);}
  .tag{
    display:inline-block; font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
    padding:2px 8px; border-radius:20px; background:rgba(201,162,39,0.15);
    color:var(--gold-bright); border:1px solid rgba(201,162,39,0.35);
  }
  .empty{text-align:center; color:var(--ink-dim); font-size:13px; padding:20px; border:1px dashed rgba(238,242,234,0.15); border-radius:10px;}

  .toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:var(--gold-bright); color:#1c1503; font-weight:600; padding:12px 20px;
    border-radius:10px; font-size:13.5px; opacity:0; transition:all .25s ease; pointer-events:none; z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.error{background:var(--danger); color:#fff;}

  #appArea{display:none;}
</style>
</head>
<body>

<header>
  <div class="brand">Pitch<span>Line</span></div>
  <div class="tagline">Admin dashboard</div>
</header>

<main>

  <div id="loginArea">
    <div class="login-box">
      <h2>Sign in</h2>
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password">
      <button class="btn-primary" onclick="doLogin()">Sign in</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <div id="appArea">
    <div class="topbar">
      <span id="whoami" style="color:var(--ink-dim); font-size:12.5px;">Signed in</span>
      <button class="signout" onclick="doLogout()">Sign out</button>
    </div>

    <div class="stat-row">
      <div class="stat"><div class="n" id="statFree">0</div><div class="l">Free tips</div></div>
      <div class="stat"><div class="n" id="statVip">0</div><div class="l">VIP tips</div></div>
      <div class="stat"><div class="n" id="statActive">0</div><div class="l">Active VIP users</div></div>
    </div>

    <div class="section-label">Add a tip</div>
    <div class="form-card">
      <label>Match</label>
      <input type="text" id="f_match" placeholder="e.g. Arsenal vs Chelsea">
      <div class="row2">
        <div>
          <label>League (optional)</label>
          <input type="text" id="f_league" placeholder="e.g. EPL">
        </div>
        <div>
          <label>Odds</label>
          <input type="number" step="0.01" id="f_odds" placeholder="e.g. 1.35">
        </div>
      </div>
      <label>Tip</label>
      <textarea id="f_tip" placeholder="e.g. Over 1.5 goals"></textarea>
      <label>Visibility</label>
      <select id="f_type">
        <option value="free">Free</option>
        <option value="vip">VIP</option>
      </select>
      <button class="btn-primary" onclick="addTip()">Post tip</button>
      <div class="err" id="addErr"></div>
    </div>

    <div class="section-label">Free tips</div>
    <div id="freeList"><div class="empty">Nothing here yet.</div></div>

    <div class="section-label">VIP tips</div>
    <div id="vipList"><div class="empty">Nothing here yet.</div></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
/* ================= CONFIG — EDIT THESE ================= */
// Your Apps Script Web App URL (ends in /exec) — see SETUP-GUIDE.md
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJ5hojeie_vH1mwABGF871SJ1F1M3tiNSDZHxjIexSucAyeFTEqJ7IvVLrjZRC7vWh4Q/exec";
// This page's login password — pick your own.
const ADMIN_PASSWORD = "samsam32";
// Must exactly match ADMIN_KEY inside your Apps Script code (AppsScript-Code.gs).
const ADMIN_KEY = "s1-a2-m3";
/* ========================================================== */

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(()=> t.className = 'toast', 3000);
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function doLogin(){
  const pass = document.getElementById('password').value;
  const errEl = document.getElementById('loginErr');
  if(pass !== ADMIN_PASSWORD){
    errEl.textContent = 'Wrong password.';
    return;
  }
  errEl.textContent = '';
  sessionStorage.setItem('pl_admin_in', '1');
  showApp();
}
function doLogout(){
  sessionStorage.removeItem('pl_admin_in');
  document.getElementById('loginArea').style.display = 'block';
  document.getElementById('appArea').style.display = 'none';
}
function showApp(){
  document.getElementById('loginArea').style.display = 'none';
  document.getElementById('appArea').style.display = 'block';
  loadAll();
}
// Stay signed in for this browser tab/session
if(sessionStorage.getItem('pl_admin_in') === '1'){ showApp(); }

function loadAll(){
  fetch(`${APPS_SCRIPT_URL}?action=list_predictions&type=free`)
    .then(r => r.json())
    .then(docs => {
      document.getElementById('statFree').textContent = docs.length;
      renderList('freeList', docs);
    });

  fetch(`${APPS_SCRIPT_URL}?action=list_predictions&type=vip`)
    .then(r => r.json())
    .then(docs => {
      document.getElementById('statVip').textContent = docs.length;
      renderList('vipList', docs);
    });

  fetch(`${APPS_SCRIPT_URL}?action=count_active_vip`)
    .then(r => r.json())
    .then(res => {
      document.getElementById('statActive').textContent = res.count || 0;
    });
}

function renderList(elId, docs){
  const el = document.getElementById(elId);
  if(!docs.length){ el.innerHTML = '<div class="empty">Nothing here yet.</div>'; return; }
  el.innerHTML = docs.map(d => `
    <div class="slip">
      <div class="slip-row">
        <div class="slip-match">${escapeHtml(d.match)}</div>
        <div class="slip-odds">${d.odds ? Number(d.odds).toFixed(2) : ''}</div>
      </div>
      <div class="slip-tip">${escapeHtml(d.tip)}</div>
      <div style="margin-top:6px;"><span class="tag">${d.type}</span> ${d.league ? '· ' + escapeHtml(d.league) : ''}</div>
      <div class="slip-actions">
        <button onclick="removeTip('${d.id}')" class="del">Delete</button>
      </div>
    </div>
  `).join('');
}

function addTip(){
  const match = document.getElementById('f_match').value.trim();
  const league = document.getElementById('f_league').value.trim();
  const odds = parseFloat(document.getElementById('f_odds').value);
  const tip = document.getElementById('f_tip').value.trim();
  const type = document.getElementById('f_type').value;
  const errEl = document.getElementById('addErr');

  if(!match || !tip || !odds || isNaN(odds)){
    errEl.textContent = 'Please fill in match, tip and odds.';
    return;
  }
  errEl.textContent = '';

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight on Apps Script
    body: JSON.stringify({ action: 'add_prediction', adminKey: ADMIN_KEY, match, league, odds, tip, type })
  }).then(r => r.json())
    .then(res => {
      if(res.success){
        document.getElementById('f_match').value = '';
        document.getElementById('f_league').value = '';
        document.getElementById('f_odds').value = '';
        document.getElementById('f_tip').value = '';
        showToast('Tip posted.');
        loadAll();
      } else {
        showToast(res.error === 'unauthorized' ? 'Admin key mismatch — check config.' : 'Could not post tip.', true);
      }
    })
    .catch(err => { console.error(err); showToast('Could not post tip — check your connection.', true); });
}

function removeTip(id){
  if(!confirm('Delete this tip?')) return;
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'delete_prediction', adminKey: ADMIN_KEY, id })
  }).then(r => r.json())
    .then(res => {
      if(res.success){ showToast('Tip deleted.'); loadAll(); }
      else { showToast('Could not delete tip.', true); }
    })
    .catch(err => { console.error(err); showToast('Could not delete tip.', true); });
}
</script>

</body>
</html>
